services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env  # ይህ ፋይል በውስጡ ያለውን DATABASE_URL እንዲያነብ ያደርገዋል
    environment:
      - NODE_ENV=development

# የ "db" ክፍል ተሰርዟል ምክንያቱም Neon ስለምንጠቀም